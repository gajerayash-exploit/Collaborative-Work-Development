kind = "web"
previewPath = "/"
title = "Project Nexus"
version = "1.0.0"
id = "artifacts/project-nexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22124

[services.development]
run = "pnpm --filter @workspace/project-nexus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-nexus", "run", "build" ]
publicDir = "artifacts/project-nexus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22124"
BASE_PATH = "/"
