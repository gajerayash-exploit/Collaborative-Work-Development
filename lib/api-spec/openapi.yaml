components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UserProfile:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - email
        - name
        - createdAt

    UpdateUserProfileBody:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        slug:
          type: string
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        role:
          type: string
          enum: [admin, editor, viewer]
      required:
        - id
        - name
        - slug
        - ownerId
        - createdAt
        - updatedAt
        - memberCount
        - role

    WorkspaceSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        slug:
          type: string
        memberCount:
          type: integer
        role:
          type: string
          enum: [admin, editor, viewer]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - memberCount
        - role
        - createdAt

    CreateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required:
        - name

    UpdateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true

    WorkspaceStats:
      type: object
      properties:
        memberCount:
          type: integer
        fileCount:
          type: integer
        messageCount:
          type: integer
        workspaceCreatedAt:
          type: string
          format: date-time
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        recentFiles:
          type: array
          items:
            $ref: "#/components/schemas/RecentFile"
        recentMessages:
          type: array
          items:
            $ref: "#/components/schemas/RecentMessage"
        recentMembers:
          type: array
          items:
            $ref: "#/components/schemas/RecentMember"
      required:
        - memberCount
        - fileCount
        - messageCount
        - workspaceCreatedAt
        - recentActivity
        - recentFiles
        - recentMessages
        - recentMembers

    ActivityItem:
      type: object
      properties:
        type:
          type: string
          enum: [message, file_upload, member_joined, member_left]
        description:
          type: string
        userName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - type
        - description
        - userName
        - createdAt

    RecentFile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        mimeType:
          type: string
        uploaderName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - size
        - mimeType
        - uploaderName
        - createdAt

    RecentMessage:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        senderName:
          type: string
        senderAvatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - senderName
        - createdAt

    RecentMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, editor, viewer]
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - joinedAt

    WorkspaceMember:
